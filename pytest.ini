[pytest]
addopts =
    -v
    --html=reports/report.html
    --self-contained-html

testpaths = tests

timeout = 30

markers =
    smoke: Quick sanity tests — page loads, nav, key elements present
    regression: Full regression suite — all functional flows
    summary: Tests scoped to the Summary page
    judge: Tests scoped to the Judge page
    crawler: Tests scoped to the Crawler Setup page

# Base URL used by pytest-playwright's `page.goto` shorthand (optional)
base_url = https://pose-director-demo-8c241.web.app
